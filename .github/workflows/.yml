name: Flutter CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Install Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      # 3. Get dependencies
      - name: Get dependencies
        run: flutter pub get

      # 4. Analyze code
      - name: Analyze
        run: flutter analyze

      # 5. Run tests (CI)
      - name: Run tests
        run: flutter test

      # 6. Build APK (CD)
      - name: Build APK
        run: flutter build apk --release

      # 7. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk